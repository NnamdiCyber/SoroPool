apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: soropool-backend-hpa
  namespace: soropool-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: soropool-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: websocket_connections_per_pod
        target:
          type: AverageValue
          averageValue: "500"
