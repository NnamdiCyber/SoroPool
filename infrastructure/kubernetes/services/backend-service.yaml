apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: soropool-prod
  labels:
    app: backend
    tier: api
spec:
  type: ClusterIP
  ports:
    - name: http-api
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: ws
      port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app: backend
