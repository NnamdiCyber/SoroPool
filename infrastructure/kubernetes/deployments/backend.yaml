apiVersion: apps/v1
kind: Deployment
metadata:
  name: soropool-backend
  namespace: soropool-prod
  labels:
    app: soropool-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: soropool-backend
  template:
    metadata:
      labels:
        app: soropool-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/soropool/backend:latest
          ports:
            - containerPort: 3000
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: soropool-db
                  key: host
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: soropool-db
                  key: password
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/pools
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/pools
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: soropool-backend
  namespace: soropool-prod
spec:
  selector:
    app: soropool-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: ws
      port: 3001
      targetPort: 3001
  type: ClusterIP
