apiVersion: apps/v1
kind: Deployment
metadata:
  name: soropool-frontend
  namespace: soropool-prod
  labels:
    app: soropool-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: soropool-frontend
  template:
    metadata:
      labels:
        app: soropool-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/soropool/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: soropool-frontend
  namespace: soropool-prod
spec:
  selector:
    app: soropool-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
