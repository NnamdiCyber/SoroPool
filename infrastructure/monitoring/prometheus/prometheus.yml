global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alerts.yml"
  - "recording-rules.yml"

scrape_configs:
  - job_name: "backend"
    scrape_interval: 10s
    static_configs:
      - targets:
        - backend:3000
        - indexer:3002
    metrics_path: /metrics

  - job_name: "node-exporter"
    static_configs:
      - targets:
        - node-exporter:9100

  - job_name: "kubernetes"
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: backend|frontend|indexer
