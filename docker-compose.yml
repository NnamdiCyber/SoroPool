version: '3.9'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: soropool
      POSTGRES_USER: soropool
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-soropool}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soropool"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-soropool} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: soropool
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-soropool}
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
      target: development
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: soropool
      DATABASE_USER: soropool
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-soropool}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-soropool}
      RABBITMQ_URL: amqp://soropool:${RABBITMQ_PASSWORD:-soropool}@rabbitmq:5672
    volumes:
      - ./backend/src:/app/src
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "4200:4200"
    environment:
      API_URL: http://backend:3000
      WS_URL: ws://backend:3001
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
