name: CI — SoroPool

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/**/Cargo.toml') }}
      - name: Build pool contracts
        run: |
          cd contracts
          cargo build --target wasm32-unknown-unknown --release \
            -p soropool-constant-product-pool \
            -p soropool-stableswap-pool \
            -p soropool-concentrated-liquidity-pool
      - name: Build remaining contracts
        run: cd contracts && cargo build --target wasm32-unknown-unknown --release
      - name: Run contract tests
        run: cd contracts && cargo test -- --nocapture
      - name: Clippy lint
        run: cd contracts && cargo clippy -- -D warnings
      - name: Check contract size
        run: |
          for f in contracts/target/wasm32-unknown-unknown/release/*.wasm; do
            size=$(wc -c < "$f")
            echo "$f: ${size} bytes"
            [ "$size" -le 65536 ] || (echo "Contract too large!" && exit 1)
          done

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: soropool_test
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd backend && npm ci
      - run: cd backend && npm run lint
      - run: cd backend && npm run test:cov
      - uses: codecov/codecov-action@v3

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run test:ci
      - run: cd frontend && npm run build -- --configuration production

  amm-math-parity:
    runs-on: ubuntu-latest
    name: Verify TS ↔ Rust AMM math parity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd backend && npm ci && npm run test:amm-parity
