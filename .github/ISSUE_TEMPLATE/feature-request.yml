name: Feature Request
description: Suggest an idea for SoroPool
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this feature working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Smart Contract
        - Backend
        - Frontend
        - Infrastructure
        - Documentation
