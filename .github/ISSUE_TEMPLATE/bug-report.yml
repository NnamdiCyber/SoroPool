name: Bug Report
description: Report a bug to help us improve SoroPool
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: If applicable, add logs or screenshots to help explain the problem.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: |
        e.g. testnet, mainnet, local dev — browser / RPC endpoint
